  - name: Azure Load Balancer REST API
    description: >-
      Azure Load Balancer REST API provides management of layer-4 load balancers
      for distributing network traffic across virtual machines. It supports
      configuring frontend IPs, backend pools, health probes, load balancing
      rules, and inbound NAT rules.
