name: Azure Load Balancer
description: >-
  Azure Load Balancer is a high-performance, low-latency layer-4 load balancing
  service for distributing inbound and outbound network traffic across virtual
  machines and other Azure resources. It supports public and internal load
  balancers, health probes, NAT rules, and HA scenarios.
